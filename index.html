<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESP32 Power Monitor</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#5f6caf,#7f53ac,#647dee);
  color:#fff;
  text-align:center;
}

/* Loader */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f2027;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.progress-container{
  width:70%;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:20px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:lime;
  animation:load 2s linear forwards;
}

@keyframes load{
  from{width:0%;}
  to{width:100%;}
}

/* Cards */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#f5f5f5;
  color:#333;
  width:220px;
  margin:15px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* Battery */
.battery-box{
  width:80%;
  margin:20px auto;
  background:#333;
  border-radius:15px;
}

.battery-fill{
  height:25px;
  width:0%;
  background:lime;
}

/* Warning */
.warning{
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1>⚡ ESP32 SYSTEM BOOTING</h1>
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
</div>

<h2>⚡ Real-time Power Monitoring</h2>

<!-- QR -->
<div>
  <img id="qr" width="130">
</div>

<!-- MOTOR STATUS -->
<h3>Motor Status</h3>
<div id="motorStatus">Motor OFF</div>
<div id="speedValue">Speed: 0</div>

<!-- CARDS -->
<div class="container">

  <div class="card">
    🔋<div id="v">--</div> Voltage
  </div>

  <div class="card">
    ⚡<div id="c">--</div> Current
  </div>

  <div class="card">
    💡<div id="p">--</div> Power
  </div>

  <div class="card">
    🔋<div id="b">--</div> Battery
  </div>

</div>

<!-- BATTERY BAR -->
<div class="battery-box">
  <div id="bar" class="battery-fill"></div>
</div>

<div id="alert"></div>

<h3>Last 10 Records</h3>

<table id="historyTable" border="1"
style="width:95%;margin:auto;background:white;color:black;">
<tr>
<th>Time</th>
<th>Voltage</th>
<th>Current</th>
<th>Power</th>
<th>Battery</th>
</tr>
</table>

<div class="footer">
ESP32 IoT Power Monitor<br>
Made by Marshal Basumatary
</div>

<script>

const channelID = "3374066";
const readAPIKey = "Z4HLTM38PBCBFQU7";

// ================= LOAD =================
window.addEventListener("load", function () {

  setTimeout(function () {
    document.getElementById("loader").style.display = "none";
  }, 2000);

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
    encodeURIComponent(window.location.href);

  loadHistory();
});

// ================= LIVE DATA =================
setInterval(function () {

fetch(`https://api.thingspeak.com/channels/${channelID}/feeds/last.json?api_key=${readAPIKey}`)
.then(res => res.json())
.then(data => {

  let voltage = parseFloat(data.field1) || 0;
  let current = parseFloat(data.field2) || 0;
  let power   = parseFloat(data.field3) || 0;
  let battery = parseFloat(data.field4) || 0;

  let motorStatus = data.field5 || "0";
  let speed = data.field6 || "0";

  document.getElementById("motorStatus").innerHTML =
    (motorStatus == "1") ? "Motor ON" : "Motor OFF";

  document.getElementById("speedValue").innerHTML =
    "Speed: " + speed;

  document.getElementById("v").innerHTML = voltage.toFixed(2) + " V";
  document.getElementById("c").innerHTML = current.toFixed(1) + " mA";
  document.getElementById("p").innerHTML = power.toFixed(1) + " mW";
  document.getElementById("b").innerHTML = battery.toFixed(0) + " %";

  let bar = document.getElementById("bar");
  bar.style.width = battery + "%";

  if(battery > 50) bar.style.background = "lime";
  else if(battery > 20) bar.style.background = "orange";
  else bar.style.background = "red";

  document.getElementById("alert").innerHTML =
    (battery < 20) ? "<div class='warning'>⚠ LOW BATTERY</div>" : "";

});

}, 2000);

// ================= HISTORY =================
function loadHistory(){

fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPIKey}&results=10`)
.then(res => res.json())
.then(data => {

  let table = document.getElementById("historyTable");

  while(table.rows.length > 1){
    table.deleteRow(1);
  }

  if(!data.feeds || data.feeds.length === 0){
    let row = table.insertRow();
    row.insertCell(0).innerHTML = "No Data";
    row.insertCell(1).innerHTML = "-";
    row.insertCell(2).innerHTML = "-";
    row.insertCell(3).innerHTML = "-";
    row.insertCell(4).innerHTML = "-";
    return;
  }

  data.feeds.reverse().forEach(feed => {

    let row = table.insertRow();

    row.insertCell(0).innerHTML = feed.created_at;
    row.insertCell(1).innerHTML = feed.field1 || "--";
    row.insertCell(2).innerHTML = feed.field2 || "--";
    row.insertCell(3).innerHTML = feed.field3 || "--";
    row.insertCell(4).innerHTML = feed.field4 || "--";

  });

});

}

</script>

</body>
</html>
